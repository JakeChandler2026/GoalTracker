    body {
      font-family: Arial, sans-serif;
      padding: 16px;
    }

    .pass {
      color: #0f7a45;
    }

    .fail {
      color: #b42318;
    }
  </style>
</head>
<body>
  <h1>Goal Tracker Tests</h1>
  <div id="results">Running...</div>
  <iframe id="appFrame" src="./demo-test-app.html" style="width:1280px;height:2200px;border:0;"></iframe>

  <script>
    const results = document.getElementById("results");
    const frame = document.getElementById("appFrame");
    let hasRun = false;
    let lastAlertMessage = "";
    let lastConfirmMessage = "";
    let nextConfirmResponse = true;
    const harnessToday = "2026-05-22";

    function assert(condition, message) {
      const line = document.createElement("div");
      line.className = condition ? "pass" : "fail";
      line.textContent = `${condition ? "PASS" : "FAIL"}: ${message}`;
      results.appendChild(line);

      if (!condition) {
        throw new Error(message);
      }
    }

    function click(element) {
      element.dispatchEvent(new MouseEvent("click", { bubbles: true }));
    }

    function change(element) {
      element.dispatchEvent(new Event("change", { bubbles: true }));
    }

    function submit(element) {
      if (typeof element.requestSubmit === "function") {
        element.requestSubmit();
        return;
      }

      element.dispatchEvent(new Event("submit", { bubbles: true, cancelable: true }));
    }

    function chooseRegisterWard(doc, wardText) {
      const select = doc.getElementById("registerWard");
      const option = Array.from(select.options).find((item) => item.textContent.includes(wardText));
      assert(Boolean(option), `Signup ward dropdown includes ${wardText}`);
      select.value = option.value;
      change(select);
    }

    function dragBefore(win, source, target) {
      const dataTransfer = new win.DataTransfer();
      source.dispatchEvent(new win.DragEvent("dragstart", { bubbles: true, dataTransfer }));
      target.dispatchEvent(new win.DragEvent("dragover", { bubbles: true, cancelable: true, dataTransfer, clientY: target.getBoundingClientRect().top }));
      target.dispatchEvent(new win.DragEvent("drop", { bubbles: true, cancelable: true, dataTransfer }));
      source.dispatchEvent(new win.DragEvent("dragend", { bubbles: true, dataTransfer }));
    }

    async function openGoalEditor(doc, card) {
      click(Array.from(card.querySelectorAll("button")).find((button) => button.textContent.includes("Edit Goal")));
      await waitFor(() => Boolean(doc.querySelector(".goal-editor-overlay")));
      return doc.querySelector(".goal-editor-overlay");
    }

    async function openAdminView(doc, label) {
      const button = Array.from(doc.querySelectorAll("[data-admin-view]")).find((item) => item.textContent.includes(label));
      assert(Boolean(button), `Admin navigation includes ${label}`);
      click(button);
      await new Promise((resolve) => setTimeout(resolve, 150));
    }

    function getAdminNavLabels(doc) {
      return Array.from(doc.querySelectorAll("[data-admin-view] strong")).map((node) => node.textContent.trim());
    }

    function addDays(dateString, days) {
      const date = new Date(`${dateString}T00:00:00`);
      date.setDate(date.getDate() + days);
      return date.toISOString().slice(0, 10);
    }

    function formatHarnessDate(dateString) {
      const date = new Date(`${dateString}T00:00:00`);
      return date.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    }

    async function waitFor(condition, timeoutMs = 10000, intervalMs = 100) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        if (condition()) {
          return;
        }
        await new Promise((resolve) => setTimeout(resolve, intervalMs));
      }

      throw new Error("Timed out waiting for app state");
    }

        reloadedDoc.getElementById("password").value = "steward123";
        submit(reloadedDoc.getElementById("loginForm"));
        await new Promise((resolve) => setTimeout(resolve, 250));
        await openAdminView(reloadedDoc, "Ward Approval");
        const disabledMorganAccessCard = Array.from(reloadedDoc.querySelectorAll(".access-review-card")).find((card) =>
          card.textContent.includes("Morgan Young") && card.textContent.includes("Disabled")
        );
        assert(Boolean(disabledMorganAccessCard), "Bishop can see disabled parent status");
        const enableParentButton = Array.from(disabledMorganAccessCard.querySelectorAll("button")).find((button) => button.textContent.includes("Enable Access"));
        assert(Boolean(enableParentButton), "Bishop can re-enable parent access");
        click(enableParentButton);
        await new Promise((resolve) => setTimeout(resolve, 250));

        click(reloadedDoc.getElementById("logoutButton"));
        await new Promise((resolve) => setTimeout(resolve, 150));

        lastAlertMessage = "";
        click(reloadedDoc.getElementById("parentTab"));
        reloadedDoc.getElementById("username").value = "morgan.parent@example.com";
        reloadedDoc.getElementById("password").value = "parentpass";
        submit(reloadedDoc.getElementById("loginForm"));
        await new Promise((resolve) => setTimeout(resolve, 250));
        assert(reloadedDoc.getElementById("sessionTitle").textContent.includes("Morgan Young"), "Re-enabled parent can sign in");

        click(reloadedDoc.getElementById("logoutButton"));
        await new Promise((resolve) => setTimeout(resolve, 150));

        click(reloadedDoc.getElementById("leaderTab"));
        reloadedDoc.getElementById("username").value = "new.leader@example.com";
        reloadedDoc.getElementById("password").value = "simplepass";
        submit(reloadedDoc.getElementById("loginForm"));
        await new Promise((resolve) => setTimeout(resolve, 250));

        assert(reloadedDoc.getElementById("sessionTitle").textContent.includes("New Leader"), "Approved Youth leader can sign in");

        results.insertAdjacentHTML("afterbegin", "<strong>All browser tests passed.</strong>");
      } catch (error) {
        const line = document.createElement("div");
        line.className = "fail";
        line.textContent = `FAIL: ${error.message}`;
        results.appendChild(line);
      }
    });
  </script>
