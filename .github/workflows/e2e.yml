name: Browser E2E

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  browser-e2e:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run syntax and fixture checks
        run: npm run test:syntax

      - name: Run browser E2E harness
        run: npm run test:e2e

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-e2e-output
          path: |
            chrome-test-output.html
            chrome-test-screenshot.png
          if-no-files-found: ignore
